<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Library Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <h1>Music Library</h1>
            <p class="subtitle">Authentication and CRUD Web Application</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password">
                </div>

                <button type="submit" class="primary-btn">Login</button>
            </form>

            <p class="hint">Demo Login: admin / admin123</p>
            <p id="loginMessage" class="message"></p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById("loginForm");
        const loginMessage = document.getElementById("loginMessage");

        loginForm.addEventListener("submit", async function(event) {
            event.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!username || !password) {
                loginMessage.textContent = "Please enter username and password.";
                loginMessage.className = "message error";
                return;
            }

            const response = await fetch("/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            });

            console.log("Login API Status Code:", response.status);

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem("music_token", data.access_token);
                localStorage.setItem("music_user", data.username);
                window.location.href = "/home";
            } else {
                loginMessage.textContent = data.error || "Login failed.";
                loginMessage.className = "message error";
            }
        });
    </script>
</body>
</html>
